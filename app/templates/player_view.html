<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ player.name }} — {{ session.code }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        dm: { 400:'#b08a35',500:'#8b6914',600:'#6e520f',700:'#523d0b' }
      }}},
      safelist: ['bg-green-500','bg-red-500','text-green-400','text-red-400',
                 'ring-2','ring-white','opacity-50']
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/static/multiplayer.js?v=5"></script>
  <style>
    [x-cloak]{display:none!important}
    .map-wrap::-webkit-scrollbar { display: none; }
    .map-wrap { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-slate-900 text-white h-screen flex flex-col overflow-hidden"
      x-data="dungeonSession()"
      data-dungeon='{{ dungeon | tojson }}'
      data-role="player"
      data-code="{{ session.code }}"
      data-pid="{{ player.id }}">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 py-2 flex items-center gap-4 shrink-0">
    <span class="w-4 h-4 rounded-full shrink-0 border-2 border-white/40"
          style="background: {{ player.color }}"></span>
    <span class="font-bold text-white">{{ player.name }}</span>
    <span class="text-slate-500 text-sm">·</span>
    <span class="text-slate-400 text-sm">{{ dungeon.area_type | title }}</span>

    <span class="ml-auto flex items-center gap-2 text-xs">
      <span :class="connected ? 'bg-green-500' : 'bg-red-500'"
            class="w-2 h-2 rounded-full"></span>
      <span x-text="connected ? 'Connected' : 'Reconnecting…'"
            :class="connected ? 'text-green-400' : 'text-red-400'"></span>
    </span>
  </header>

  <!-- ── Canvas ──────────────────────────────────────────────────────────── -->
  <div class="flex flex-1 flex-col overflow-hidden p-3 gap-2">

    <!-- Level tabs (multi-level only) -->
    {% if dungeon.num_levels > 1 %}
    <div class="flex gap-2 shrink-0">
      {% for i in range(dungeon.num_levels) %}
      <button @click="currentLevel = {{ i }}; render()"
              :class="currentLevel === {{ i }}
                ? 'bg-dm-600 text-white'
                : 'bg-slate-700 text-slate-300 hover:bg-slate-600'"
              class="px-3 py-1 rounded-lg text-sm font-semibold transition-colors">
        Level {{ i + 1 }}{% if i == 0 %} (entrance){% elif i == dungeon.num_levels - 1 %} (boss){% endif %}
      </button>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Zoom controls -->
    <div class="shrink-0 flex items-center gap-2">
      <span class="text-xs text-slate-500">Zoom</span>
      <button @click="zoomOut()"
              class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-700
                     hover:bg-slate-600 text-white font-bold text-sm transition-colors">−</button>
      <button @click="zoomReset()"
              class="px-2 h-7 rounded-lg bg-slate-700 hover:bg-slate-600 text-white
                     text-xs font-mono transition-colors min-w-12 text-center"
              x-text="zoomPct"></button>
      <button @click="zoomIn()"
              class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-700
                     hover:bg-slate-600 text-white font-bold text-sm transition-colors">+</button>
      <span class="text-xs text-slate-700 ml-1 hidden sm:inline">Scroll to zoom · Pinch on touch · Drag to pan</span>
    </div>

    <div x-ref="wrap"
         class="map-wrap flex-1 overflow-auto rounded-xl bg-slate-950 border border-slate-700"
         :class="panning ? 'cursor-grabbing' : 'cursor-grab'">
      <canvas x-ref="canvas"
              @pointerdown="onPointerDown($event)"
              @pointermove="onPointerMove($event)"
              @pointerup="onPointerUp($event)"
              @pointerleave="onPointerLeave()"
              @wheel="onWheel($event)"
              @touchstart.passive="onTouchStart($event)"
              @touchmove.prevent="onTouchMove($event)"
              @touchend.passive="onTouchEnd($event)"
              class="block touch-none">
      </canvas>
    </div>

    <!-- Status bar -->
    <div class="shrink-0 h-5 text-xs text-slate-400 flex items-center justify-between">
      <span class="flex items-center gap-1">
        <template x-if="hoveredToken">
          <span>
            <span class="inline-block w-2 h-2 rounded-full mr-1"
                  :style="`background:${hoveredToken?.color}`"></span>
            <span class="font-semibold text-white" x-text="hoveredToken?.name"></span>
            <span class="text-slate-500" x-text="`(${hoveredToken?.type})`"></span>
          </span>
        </template>
        <template x-if="!hoveredToken && hoveredSquare">
          <span>
            (<span x-text="hoveredSquare?.x"></span>, <span x-text="hoveredSquare?.y"></span>)
            — <span x-text="tileName" class="text-slate-300 font-semibold"></span>
          </span>
        </template>
        <template x-if="!hoveredToken && !hoveredSquare">
          <span class="text-slate-600">Tap token to select · tap tile to move · tap doors to open</span>
        </template>
      </span>
      <span class="text-slate-500 shrink-0">
        <span x-text="onlinePlayers.length"></span> player<span x-show="onlinePlayers.length !== 1" x-cloak>s</span> online
      </span>
    </div>
  </div>

</body>
</html>
