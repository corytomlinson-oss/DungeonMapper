{% if saved %}
<div class="bg-white rounded-2xl shadow p-4">
  <h3 class="text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">Saved Dungeons</h3>
  <div class="space-y-2">
    {% for d in saved %}
    <div class="flex items-center justify-between gap-2 text-sm group">
      <button
        hx-get="/dungeons/{{ d.id }}"
        hx-target="#dungeon-result"
        hx-swap="innerHTML"
        class="flex-1 text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-dm-50
               hover:text-dm-700 transition-colors">
        <div class="font-semibold">{{ d.name or (d.area_type|title + ' Dungeon') }}</div>
        <div class="text-xs text-slate-400">
          {{ d.size|title }} · {{ d.num_levels }} level{% if d.num_levels != 1 %}s{% endif %} ·
          {{ d.created_at.strftime('%b %d') }}
        </div>
      </button>
      <button
        hx-post="/dungeons/{{ d.id }}/delete"
        hx-target="#saved-list"
        hx-swap="innerHTML"
        hx-confirm="Delete this dungeon?"
        class="p-1.5 rounded text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
    {% endfor %}
  </div>
</div>
{% else %}
<div class="bg-white rounded-2xl shadow p-4 text-sm text-slate-400 text-center">
  No saved dungeons yet
</div>
{% endif %}
